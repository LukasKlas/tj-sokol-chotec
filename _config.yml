title: TJ Sokol Choteč
description: Fotbalový oddíl TJ Sokol Choteč. Zápasy, výsledky a aktuality z Choteče.
url: "https://tj-sokol-chotec.pages.dev"
baseurl: ""
email: jaroslav.minovsky@gmail.com
accent_color: "#7B1F3F"

# Klub
klub_nazev: "TJ Sokol Choteč"
klub_rok: "1943"
sezona: "2025 / 26"

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /blog/:slug

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM

sass:
  style: compressed

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

paginate: 9
paginate_path: "/blog/page-:num/"
future: true

exclude:
  - sveltia-cms-auth
  - node_modules
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor