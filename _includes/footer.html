<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-logo">
      TJ Sokol <span>Choteč</span>
    </div>
    <div class="footer-links">
      {% for item in site.data.navigace %}
      <a href="{{ item.url | relative_url }}">{{ item.nazev }}</a>
      {% endfor %}
    </div>
    <p class="footer-copy">© {{ 'now' | date: '%Y' }} {{ site.title }} · Všechna práva vyhrazena</p>
  </div>
</footer>
