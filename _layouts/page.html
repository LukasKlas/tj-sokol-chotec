---
layout: default
---
<div class="page-post">

  <header class="post__header">
    <div class="wrap">
      <h1 class="post__title">{{ page.title }}</h1>
      {% if page.subtitle %}
      <h2 class="post__subtitle">{{ page.subtitle }}</h2>
      {% endif %}
    </div>
  </header>

  <section class="post-full">
    <div class="wrap">
      <article class="post__content">
        {{ content }}
      </article>
    </div>
  </section>

</div>
