---
layout: default
---
<div class="page-post">

  <header class="post__header" style="background: var(--white); padding: 3rem 0 2rem;">
    <div class="wrap">
      <div class="section-header">
        <h1 class="section-title">{{ page.title }}</h1>
        <div class="section-line"></div>
      </div>
      {% if page.subtitle %}
      <h2 class="post__subtitle" style="color: #999;">{{ page.subtitle }}</h2>
      {% endif %}
    </div>
  </header>

  <section class="post-full">
    <div class="wrap">
      <article class="post__content">
        {{ content }}
      </article>
    </div>
  </section>

</div>
